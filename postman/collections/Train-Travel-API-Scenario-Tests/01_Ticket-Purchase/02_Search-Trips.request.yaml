$kind: http-request
name: '02. Search Trips'
description: Search for available trips by specifying origin, destination, and date, then save the first trip ID.
url: '{{baseUrl}}/trips'
method: GET
order: 2000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: origin
    value: '{{originStationId}}'
    description: ID of the origin station
  - key: destination
    value: '{{destinationStationId}}'
    description: ID of the destination station
  - key: date
    value: '2024-02-01T09:00:00Z'
    description: Departure date and time (ISO 8601 format)
  - key: bicycles
    value: 'false'
  - key: dogs
    value: 'false'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has trip data", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json.data).to.be.an("array").that.is.not.empty;
      });

      // Save the first trip ID
      const json = pm.response.json();
      if (json.data && json.data.length >= 1) {
          pm.collectionVariables.set("tripId", json.data[0].id);
          console.log("tripId set to: " + json.data[0].id);
      }
    language: text/javascript
