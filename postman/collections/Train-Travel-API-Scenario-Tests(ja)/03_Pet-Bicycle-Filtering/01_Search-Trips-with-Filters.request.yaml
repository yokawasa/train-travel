$kind: http-request
name: '01. ペット・自転車対応便を検索する'
description: ペットと自転車の持ち込みが可能な便のみを絞り込んで検索します。
url: '{{baseUrl}}/trips'
method: GET
order: 1000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: origin
    value: 'efdbb9d1-02c2-4bc3-afb7-6788d8782b1e'
    description: 出発駅のID
  - key: destination
    value: 'b2e783e1-c824-4d63-b37a-d8d698862f1d'
    description: 到着駅のID
  - key: date
    value: '2024-02-01T09:00:00Z'
    description: 出発日時（ISO 8601形式）
  - key: bicycles
    value: 'true'
    description: 自転車持ち込み可能な便のみ
  - key: dogs
    value: 'true'
    description: ペット同伴可能な便のみ
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has trip data", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json.data).to.be.an("array");
      });

      pm.test("All returned trips allow bicycles and dogs", function () {
          const json = pm.response.json();
          json.data.forEach(function (trip) {
              if (trip.bicycles_allowed !== undefined) {
                  pm.expect(trip.bicycles_allowed).to.be.true;
              }
              if (trip.dogs_allowed !== undefined) {
                  pm.expect(trip.dogs_allowed).to.be.true;
              }
          });
      });

      // 最初の便IDを保存
      const json = pm.response.json();
      if (json.data && json.data.length >= 1) {
          pm.collectionVariables.set("tripId", json.data[0].id);
          console.log("tripId (pet/bicycle) set to: " + json.data[0].id);
      }
    language: text/javascript
