$kind: http-request
name: '02. 便を検索する'
description: 出発駅・到着駅・日付を指定して利用可能な便を検索し、最初の便IDを保存します。
url: '{{baseUrl}}/trips'
method: GET
order: 2000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: origin
    value: '{{originStationId}}'
    description: 出発駅のID
  - key: destination
    value: '{{destinationStationId}}'
    description: 到着駅のID
  - key: date
    value: '2024-02-01T09:00:00Z'
    description: 出発日時（ISO 8601形式）
  - key: bicycles
    value: 'false'
  - key: dogs
    value: 'false'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has trip data", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json.data).to.be.an("array").that.is.not.empty;
      });

      // 最初の便IDを保存
      const json = pm.response.json();
      if (json.data && json.data.length >= 1) {
          pm.collectionVariables.set("tripId", json.data[0].id);
          console.log("tripId set to: " + json.data[0].id);
      }
    language: text/javascript
