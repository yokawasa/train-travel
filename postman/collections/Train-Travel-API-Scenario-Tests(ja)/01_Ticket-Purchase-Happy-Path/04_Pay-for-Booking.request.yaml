$kind: http-request
name: '04. 予約の支払いをする'
description: 作成した予約に対して支払いを行い、予約を確定します。
url: '{{baseUrl}}/bookings/:bookingId/payment'
method: POST
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: bookingId
    value: '{{newBookingId}}'
    description: 支払い対象の予約ID
body:
  type: json
  content: |-
    {
      "amount": 49.99,
      "currency": "gbp",
      "source": {
        "object": "card",
        "name": "Test Passenger",
        "number": "4242424242424242",
        "cvc": 123,
        "exp_month": 12,
        "exp_year": 2025,
        "address_country": "gb"
      }
    }
auth:
  type: oauth2
  credentials:
    scope: read write
    accessTokenUrl: https://example.com/oauth/token
    authUrl: https://example.com/oauth/authorize
    grant_type: authorization_code
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Payment confirmed with required fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("id").that.is.a("string");
          pm.expect(json).to.have.property("amount").that.is.a("number");
          pm.expect(json).to.have.property("currency").that.is.a("string");
      });

      pm.test("Response has links with booking reference", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("links").that.is.an("object");
          pm.expect(json.links).to.have.property("booking").that.is.a("string");
      });
    language: text/javascript
