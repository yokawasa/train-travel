$kind: http-request
name: '01. 駅を検索する'
description: 出発駅と到着駅を検索し、IDをコレクション変数に保存します。
url: '{{baseUrl}}/stations'
method: GET
order: 1000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: page
    value: '1'
  - key: limit
    value: '10'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has station data", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json.data).to.be.an("array").that.is.not.empty;
      });

      // 最初の2駅を出発駅・到着駅として保存
      const json = pm.response.json();
      if (json.data && json.data.length >= 2) {
          pm.collectionVariables.set("originStationId", json.data[0].id);
          pm.collectionVariables.set("destinationStationId", json.data[1].id);
          console.log("originStationId set to: " + json.data[0].id);
          console.log("destinationStationId set to: " + json.data[1].id);
      }
    language: text/javascript
