$kind: http-request
name: '02. 予約一覧を確認する'
description: 認証済みユーザーの全予約一覧を取得し、作成した予約が含まれることを確認します。
url: '{{baseUrl}}/bookings'
method: GET
order: 2000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: page
    value: '1'
  - key: limit
    value: '10'
auth:
  type: oauth2
  credentials:
    scope: read write
    accessTokenUrl: https://example.com/oauth/token
    authUrl: https://example.com/oauth/authorize
    grant_type: authorization_code
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has booking list", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json.data).to.be.an("array");
      });

      pm.test("Created booking exists in list", function () {
          const json = pm.response.json();
          const newBookingId = pm.collectionVariables.get("newBookingId");
          const found = json.data.some(function (b) { return b.id === newBookingId; });
          pm.expect(found, "newBookingId should be in the list").to.be.true;
      });
    language: text/javascript
