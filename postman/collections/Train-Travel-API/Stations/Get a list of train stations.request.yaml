$kind: http-request
description: Returns a paginated and searchable list of all train stations.
url: "{{baseUrl}}/stations?page=1&limit=10&coordinates=52.5200,13.4050&search=Milano Centrale&country=DE"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: The page number to return
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 1,
            "minimum": 1
          }
        }
      }
  - key: limit
    value: "10"
    description: The number of items to return per page
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 10,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: coordinates
    value: 52.5200,13.4050
    description: |
      The latitude and longitude of the user's location, to narrow down the search results to sites within a proximity of this location.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
  - key: search
    value: Milano Centrale
    description: |
      A search term to filter the list of stations by name or address.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
  - key: country
    value: DE
    description: Filter stations by country code
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      // Contract Test: GET /stations
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response has required top-level fields: data and links", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json).to.have.property("links");
          pm.expect(json.data).to.be.an("array");
          pm.expect(json.links).to.be.an("object");
      });

      pm.test("Each station has required fields with correct types", function () {
          const json = pm.response.json();
          json.data.forEach(function (station) {
              pm.expect(station).to.have.property("id").that.is.a("string");
              pm.expect(station).to.have.property("name").that.is.a("string");
              pm.expect(station).to.have.property("address").that.is.a("string");
              pm.expect(station).to.have.property("country_code").that.is.a("string");
              // UUID format check
              pm.expect(station.id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
          });
      });

      pm.test("Optional timezone field is a string if present", function () {
          const json = pm.response.json();
          json.data.forEach(function (station) {
              if (station.timezone !== undefined) {
                  pm.expect(station.timezone).to.be.a("string");
              }
          });
      });

      pm.test("Links object has self field", function () {
          const json = pm.response.json();
          pm.expect(json.links).to.have.property("self").that.is.a("string");
      });
    language: text/javascript
  - type: beforeRequest
    code: |
      // set header for mock testing
      pm.request.headers.add({key: 'x-mock-response-code', value: '200'});
    language: text/javascript
examples: ./.resources/Get a list of train stations.resources/examples
order: 1000
