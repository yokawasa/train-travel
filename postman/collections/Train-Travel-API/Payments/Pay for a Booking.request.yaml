$kind: http-request
description: A payment is an attempt to pay for the booking, which will confirm the booking for the user and enable them to get their tickets.
url: "{{baseUrl}}/bookings/:bookingId/payment"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: bookingId
    value: "{{bookingId}}"
    description: The ID of the booking to pay for.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "uuid",
            "default": "<uuid>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "amount": 49.99,
      "currency": "gbp",
      "source": {
        "name": "J. Doe",
        "number": "4242424242424242",
        "cvc": 123,
        "exp_month": 12,
        "exp_year": 2025,
        "address_country": "gb",
        "object": "card",
        "address_line1": "123 Fake Street",
        "address_line2": "4th Floor",
        "address_city": "London",
        "address_post_code": "N12 9XX"
      }
    }
  $type: |-
    {
      "description": "A payment for a booking.",
      "type": "object",
      "properties": {
        "amount": {
          "type": "number",
          "description": "Amount intended to be collected by this payment. A positive decimal figure describing the amount to be collected."
        },
        "currency": {
          "type": "string",
          "enum": [
            "bam",
            "bgn",
            "chf",
            "eur",
            "gbp",
            "nok",
            "sek",
            "try"
          ],
          "description": "Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase."
        },
        "source": {
          "description": "The payment source to take the payment from. This can be a card or a bank account. Some of these properties will be hidden on read to protect PII leaking.",
          "oneOf": [
            {
              "description": "A card (debit or credit) to take payment from.",
              "title": "Card",
              "type": "object",
              "properties": {
                "object": {
                  "type": "string"
                },
                "name": {
                  "type": "string",
                  "description": "Cardholder's full name as it appears on the card."
                },
                "number": {
                  "type": "string",
                  "description": "The card number, as a string without any separators. On read all but the last four digits will be masked for security."
                },
                "cvc": {
                  "type": "string",
                  "minLength": 3,
                  "maxLength": 4,
                  "example": "123",
                  "description": "Card security code, 3 or 4 digits usually found on the back of the card."
                },
                "exp_month": {
                  "type": "integer",
                  "description": "Two-digit number representing the card's expiration month.",
                  "format": "int64"
                },
                "exp_year": {
                  "type": "integer",
                  "description": "Four-digit number representing the card's expiration year.",
                  "format": "int64"
                },
                "address_line1": {
                  "type": "string"
                },
                "address_line2": {
                  "type": "string"
                },
                "address_city": {
                  "type": "string"
                },
                "address_country": {
                  "type": "string"
                },
                "address_post_code": {
                  "type": "string"
                }
              },
              "required": [
                "name",
                "number",
                "cvc",
                "exp_month",
                "exp_year",
                "address_country"
              ]
            },
            {
              "description": "A bank account to take payment from. Must be able to make payments in the currency specified in the payment.",
              "title": "Bank Account",
              "type": "object",
              "properties": {
                "object": {
                  "type": "string"
                },
                "name": {
                  "type": "string"
                },
                "number": {
                  "type": "string",
                  "description": "The account number for the bank account, in string form. Must be a current account."
                },
                "sort_code": {
                  "type": "string",
                  "description": "The sort code for the bank account, in string form. Must be a six-digit number."
                },
                "account_type": {
                  "type": "string",
                  "enum": [
                    "individual",
                    "company"
                  ],
                  "description": "The type of entity that holds the account. This can be either `individual` or `company`."
                },
                "bank_name": {
                  "type": "string",
                  "description": "The name of the bank associated with the routing number."
                },
                "country": {
                  "type": "string",
                  "description": "Two-letter country code (ISO 3166-1 alpha-2)."
                }
              },
              "required": [
                "name",
                "number",
                "account_type",
                "bank_name",
                "country"
              ]
            }
          ]
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      // Contract Test: POST /bookings/{bookingId}/payment
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response has required BookingPayment fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("id").that.is.a("string");
          pm.expect(json.id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
          pm.expect(json).to.have.property("amount").that.is.a("number");
          pm.expect(json.amount).to.be.above(0);
          pm.expect(json).to.have.property("currency").that.is.a("string");
      });

      pm.test("Currency is a valid ISO enum value", function () {
          const json = pm.response.json();
          const validCurrencies = ["bam", "bgn", "chf", "eur", "gbp", "nok", "sek", "try"];
          pm.expect(validCurrencies).to.include(json.currency);
      });

      pm.test("Source object has required fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("source").that.is.an("object");
          pm.expect(json.source).to.have.property("name").that.is.a("string");
          pm.expect(json.source).to.have.property("object").that.is.a("string");
      });

      pm.test("Payment status field is valid enum when present", function () {
          const json = pm.response.json();
          if (json.status !== undefined) {
              const validStatuses = ["pending", "succeeded", "failed"];
              pm.expect(validStatuses).to.include(json.status);
          }
      });

      pm.test("Response has links object with booking field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("links").that.is.an("object");
          pm.expect(json.links).to.have.property("booking").that.is.a("string");
      });
    language: text/javascript
  - type: beforeRequest
    code: |
      // set header for mock testing
      pm.request.headers.add({key: 'x-mock-response-code', value: '201'});
    language: text/javascript
examples: ./.resources/Pay for a Booking.resources/examples
order: 1000
