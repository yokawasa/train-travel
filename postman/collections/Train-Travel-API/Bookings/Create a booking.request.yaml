$kind: http-request
description: A booking is a temporary hold on a trip. It is not confirmed until the payment is processed.
url: "{{baseUrl}}/bookings"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "trip_id": "a76cf43f-d6ff-b7da-9709-4203eadecfee",
      "passenger_name": "string",
      "has_bicycle": false,
      "has_dog": true
    }
  $type: |-
    {
      "description": "A booking for a train trip.",
      "type": "object",
      "properties": {
        "trip_id": {
          "type": "string",
          "description": "Identifier of the booked trip",
          "format": "uuid"
        },
        "passenger_name": {
          "type": "string",
          "description": "Name of the passenger"
        },
        "has_bicycle": {
          "type": "boolean",
          "description": "Indicates whether the passenger has a bicycle."
        },
        "has_dog": {
          "type": "boolean",
          "description": "Indicates whether the passenger has a dog."
        }
      }
    }
auth:
  type: oauth2
  credentials:
    scope: read write
    accessTokenUrl: https://example.com/oauth/token
    authUrl: https://example.com/oauth/authorize
    grant_type: authorization_code
scripts:
  - type: afterResponse
    code: |
      // Contract Test: POST /bookings
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);

          const json = pm.response.json();
          // Set new bookingId as Collection variable
          pm.collectionVariables.set("newBookingId", json.id)
      });

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response has required Booking fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("id").that.is.a("string");
          pm.expect(json.id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
          pm.expect(json).to.have.property("trip_id").that.is.a("string");
          pm.expect(json.trip_id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
          pm.expect(json).to.have.property("passenger_name").that.is.a("string");
      });

      pm.test("Booking optional fields have correct types when present", function () {
          const json = pm.response.json();
          if (json.has_bicycle !== undefined) pm.expect(json.has_bicycle).to.be.a("boolean");
          if (json.has_dog !== undefined) pm.expect(json.has_dog).to.be.a("boolean");
      });

      pm.test("Response has links object with self field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("links").that.is.an("object");
          pm.expect(json.links).to.have.property("self").that.is.a("string");
      });
    language: text/javascript
  - type: beforeRequest
    code: |
      // set header for mock testing
      pm.request.headers.add({key: 'x-mock-response-code', value: '201'});
    language: text/javascript
examples: ./.resources/Create a booking.resources/examples
order: 2000
