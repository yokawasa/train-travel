$kind: http-request
description: Returns a list of all trip bookings by the authenticated user.
url: "{{baseUrl}}/bookings?page=1&limit=2"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: The page number to return
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 1,
            "minimum": 1
          }
        }
      }
  - key: limit
    value: "2"
    description: The number of items to return per page
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 10,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      // Contract Test: GET /bookings
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response has required top-level fields: data and links", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("data");
          pm.expect(json).to.have.property("links");
          pm.expect(json.data).to.be.an("array");
          pm.expect(json.links).to.be.an("object");
      });

      pm.test("Each booking has required fields with correct types", function () {
          const json = pm.response.json();
          json.data.forEach(function (booking) {
              pm.expect(booking).to.have.property("id").that.is.a("string");
              pm.expect(booking.id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
              pm.expect(booking).to.have.property("trip_id").that.is.a("string");
              pm.expect(booking.trip_id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
              pm.expect(booking).to.have.property("passenger_name").that.is.a("string");
          });
      });

      pm.test("Each booking has correct optional field types when present", function () {
          const json = pm.response.json();
          json.data.forEach(function (booking) {
              if (booking.has_bicycle !== undefined) pm.expect(booking.has_bicycle).to.be.a("boolean");
              if (booking.has_dog !== undefined) pm.expect(booking.has_dog).to.be.a("boolean");
          });
      });

      pm.test("Links object has self field", function () {
          const json = pm.response.json();
          pm.expect(json.links).to.have.property("self").that.is.a("string");
      });

      // Check the number of items in data object and set the id of 1st item as bookingId if it is >= 1
      const json = pm.response.json();
      if (json.data && json.data.length >= 1) {
          const bookingId = json.data[0].id;
          pm.collectionVariables.set("bookingId", bookingId);
          console.log("bookingId set to: " + bookingId);
      }
    language: text/javascript
  - type: beforeRequest
    code: |
      // set header for mock testing
      pm.request.headers.add({key: 'x-mock-response-code', value: '200'});
    language: text/javascript
examples: ./.resources/List existing bookings.resources/examples
order: 1000
