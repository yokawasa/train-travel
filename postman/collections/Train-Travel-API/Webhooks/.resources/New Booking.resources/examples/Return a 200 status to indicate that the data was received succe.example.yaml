$kind: http-example
name: Return a 200 status to indicate that the data was received successfully.
request:
  url: "{{baseUrl}}/newBooking"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  body:
    type: json
    content: |-
      {
        "id": "efdbb9d1-02c2-4bc3-afb7-6788d8782b1e",
        "trip_id": "efdbb9d1-02c2-4bc3-afb7-6788d8782b1e",
        "passenger_name": "John Doe",
        "has_bicycle": true,
        "has_dog": true,
        "links": {
          "self": "https://api.example.com/bookings/1725ff48-ab45-4bb5-9d02-88745177dedb"
        }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
