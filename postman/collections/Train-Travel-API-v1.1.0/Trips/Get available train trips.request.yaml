$kind: http-request
description: |
  Returns a list of available train trips between the specified origin and destination stations on the given date, and allows for filtering by bicycle and dog allowances.
url: "{{baseUrl}}/trips?page=1&limit=10&origin=efdbb9d1-02c2-4bc3-afb7-6788d8782b1e&destination=b2e783e1-c824-4d63-b37a-d8d698862f1d&date=2024-02-01T09:00:00Z&bicycles=false&dogs=false"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: The page number to return
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 1,
            "minimum": 1
          }
        }
      }
  - key: limit
    value: "10"
    description: The number of items to return per page
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 10,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: origin
    value: efdbb9d1-02c2-4bc3-afb7-6788d8782b1e
    description: The ID of the origin station
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "uuid",
            "default": "<uuid>"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: destination
    value: b2e783e1-c824-4d63-b37a-d8d698862f1d
    description: The ID of the destination station
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "uuid",
            "default": "<uuid>"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: date
    value: 2024-02-01T09:00:00Z
    description: The date and time of the trip in ISO 8601 format in origin station's timezone.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "date-time",
            "default": "<dateTime>"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: bicycles
    value: "false"
    description: Only return trips where bicycles are known to be allowed
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "boolean",
            "default": false
          }
        }
      }
  - key: dogs
    value: "false"
    description: Only return trips where dogs are known to be allowed
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "boolean",
            "default": false
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/Get available train trips.resources/examples
order: 1000
