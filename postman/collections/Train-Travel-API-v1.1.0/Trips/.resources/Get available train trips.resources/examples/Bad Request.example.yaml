$kind: http-example
request:
  url: "{{baseUrl}}/trips?page=1&limit=10&origin=efdbb9d1-02c2-4bc3-afb7-6788d8782b1e&destination=b2e783e1-c824-4d63-b37a-d8d698862f1d&date=2024-02-01T09:00:00Z&bicycles=false&dogs=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  queryParams:
    - key: page
      value: "1"
      description: The page number to return
    - key: limit
      value: "10"
      description: The number of items to return per page
    - key: origin
      value: efdbb9d1-02c2-4bc3-afb7-6788d8782b1e
      description: The ID of the origin station
    - key: destination
      value: b2e783e1-c824-4d63-b37a-d8d698862f1d
      description: The ID of the destination station
    - key: date
      value: 2024-02-01T09:00:00Z
      description: The date and time of the trip in ISO 8601 format in origin station's timezone.
    - key: bicycles
      value: "false"
      description: Only return trips where bicycles are known to be allowed
    - key: dogs
      value: "false"
      description: Only return trips where dogs are known to be allowed
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
    RateLimit: ""
  body:
    type: json
    content: |-
      {
        "type": "https://example.com/errors/bad-request",
        "title": "Bad Request",
        "detail": "The request is invalid or missing required parameters.",
        "instance": "<string>",
        "status": 400
      }
    $type: |-
      {
        "description": "A problem detail object as defined in RFC 7807.",
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "description": "A URI reference that identifies the problem type"
          },
          "title": {
            "type": "string",
            "description": "A short, human-readable summary of the problem type"
          },
          "detail": {
            "type": "string",
            "description": "A human-readable explanation specific to this occurrence of the problem"
          },
          "instance": {
            "type": "string",
            "description": "A URI reference that identifies the specific occurrence of the problem"
          },
          "status": {
            "type": "integer",
            "description": "The HTTP status code"
          }
        }
      }
order: 2000
