$kind: http-request
description: Returns a paginated and searchable list of all train stations.
url: "{{baseUrl}}/stations?page=1&limit=10&coordinates=52.5200,13.4050&search=Milano Centrale&country=DE"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: The page number to return
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 1,
            "minimum": 1
          }
        }
      }
  - key: limit
    value: "10"
    description: The number of items to return per page
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 10,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: coordinates
    value: 52.5200,13.4050
    description: |
      The latitude and longitude of the user's location, to narrow down the search results to sites within a proximity of this location.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
  - key: search
    value: Milano Centrale
    description: |
      A search term to filter the list of stations by name or address.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
  - key: country
    value: DE
    description: Filter stations by country code
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/Get a list of train stations.resources/examples
order: 1000
