$kind: http-example
request:
  url: "{{baseUrl}}/bookings/:bookingId/payment"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    - key: bookingId
      value: 1725ff48-ab45-4bb5-9d02-88745177dedb
      description: The ID of the booking to pay for.
  body:
    type: json
    content: |-
      {
        "amount": 49.99,
        "currency": "gbp",
        "source": {
          "name": "J. Doe",
          "number": "4242424242424242",
          "cvc": "123",
          "exp_month": 12,
          "exp_year": 2025,
          "address_country": "gb",
          "object": "card",
          "address_line1": "123 Fake Street",
          "address_line2": "4th Floor",
          "address_city": "London",
          "address_post_code": "N12 9XX"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    RateLimit: ""
  body:
    type: json
    content: |-
      {
        "type": "https://example.com/errors/internal-server-error",
        "title": "Internal Server Error",
        "detail": "An unexpected error occurred.",
        "instance": "<string>",
        "status": 500
      }
    $type: |-
      {
        "description": "A problem detail object as defined in RFC 7807.",
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "description": "A URI reference that identifies the problem type"
          },
          "title": {
            "type": "string",
            "description": "A short, human-readable summary of the problem type"
          },
          "detail": {
            "type": "string",
            "description": "A human-readable explanation specific to this occurrence of the problem"
          },
          "instance": {
            "type": "string",
            "description": "A URI reference that identifies the specific occurrence of the problem"
          },
          "status": {
            "type": "integer",
            "description": "The HTTP status code"
          }
        }
      }
order: 5000
