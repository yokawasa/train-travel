# This is a Workflow metadata file for defining entity relationships in this workspace.
# Each workflow defines relations between entities and may include optional behavior/settings.
# The Paths are relative to the .postman directory (avoid absolute paths).
# Keep relation entries explicit and avoid duplicate pairs within the same workflow.
# This file is declarative metadata and does not execute workflows by itself.
workflows:
  syncSpecToCollection:
    - spec: ../openapi.yaml
      collection: ../postman/collections/Train-Travel-API
      options:
        syncExamples: false
        folderStrategy: Tags
        includeWebhooks: true
    - spec: ../postman/specs/openapi-v1.1.0.yaml
      collection: ../postman/collections/Train-Travel-API-v1.1.0
      options:
        syncExamples: false
        folderStrategy: Tags
        includeWebhooks: true
        alwaysInheritAuthentication: true
    - spec: ../postman/specs/openapi-v2.0.0.yaml
      collection: ../postman/collections/Train-Travel-API-v2.0.0
      options:
        folderStrategy: Tags
        alwaysInheritAuthentication: true
        syncExamples: false
